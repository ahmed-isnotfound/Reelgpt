<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎭 Admin Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --border: #333;
    --text: #f0f0f0;
    --dim: #888;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --yellow: #f59e0b;
    --purple: #a855f7;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title {
    font-size: 17px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .header-sub { font-size: 12px; color: var(--dim); }

  .session-count {
    background: var(--purple); color: white;
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 0;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; flex-shrink: 0;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap; color: var(--dim);
    border-bottom: 2px solid transparent; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--purple); }
  .tab-badge {
    background: var(--red); color: white;
    width: 18px; height: 18px; border-radius: 50%;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Content ── */
  .content {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Conversations list */
  #view-list {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #view-list::-webkit-scrollbar { width: 4px; }
  #view-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; cursor: pointer;
    transition: all 0.15s; position: relative;
    -webkit-user-select: none;
  }
  .conv-card:active { transform: scale(0.98); background: var(--card2); }
  .conv-card.unread { border-color: var(--purple); }
  .conv-card.unread::before {
    content: ''; position: absolute; left: -1px; top: -1px; bottom: -1px;
    width: 4px; background: var(--purple); border-radius: 14px 0 0 14px;
  }

  .conv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .conv-id {
    font-size: 11px; color: var(--dim);
    background: var(--card2); padding: 3px 8px;
    border-radius: 20px; font-weight: 500;
  }
  .conv-time { font-size: 11px; color: var(--dim); }
  .conv-preview { font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
  .conv-preview strong { color: var(--yellow); }
  .conv-footer { display: flex; align-items: center; justify-content: space-between; }
  .msg-count { font-size: 12px; color: var(--dim); }
  .unread-badge {
    background: var(--red); color: white;
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 700;
  }

  .empty-list {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--dim); text-align: center;
    padding: 40px;
  }
  .empty-list .emoji { font-size: 48px; }
  .empty-list p { font-size: 15px; line-height: 1.5; }

  /* ── Chat view ── */
  #view-chat {
    flex: 1; display: none; flex-direction: column; overflow: hidden;
  }

  .chat-header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .back-btn {
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 10px;
    font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500;
    transition: all 0.15s;
  }
  .back-btn:active { transform: scale(0.96); }
  .chat-header-info { flex: 1; }
  .chat-header-id { font-size: 13px; font-weight: 600; }
  .chat-header-status { font-size: 12px; color: var(--green); }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-bubble {
    max-width: 85%; padding: 10px 14px;
    border-radius: 16px; font-size: 14px; line-height: 1.5;
    animation: pop 0.2s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .chat-bubble.user {
    background: #2d2d2d; color: var(--text);
    border-radius: 16px 16px 4px 16px; align-self: flex-end;
  }
  .chat-bubble.admin {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: white; border-radius: 16px 16px 16px 4px; align-self: flex-start;
  }
  .bubble-time { font-size: 10px; margin-top: 4px; opacity: 0.6; }

  .chat-input-area {
    background: var(--card); border-top: 1px solid var(--border);
    padding: 12px; display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
  }
  .quick-replies {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
  }
  .quick-replies::-webkit-scrollbar { display: none; }
  .qr-chip {
    background: var(--card2); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 20px; white-space: nowrap;
    font-size: 12px; cursor: pointer; color: var(--text);
    transition: all 0.15s; font-family: inherit;
    -webkit-user-select: none;
  }
  .qr-chip:active { background: var(--purple); border-color: var(--purple); }

  .reply-row { display: flex; gap: 8px; align-items: flex-end; }
  #reply-input {
    flex: 1; background: var(--card2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 12px;
    font-size: 15px; font-family: inherit; resize: none;
    outline: none; line-height: 1.5; max-height: 120px;
    transition: border-color 0.2s;
  }
  #reply-input:focus { border-color: var(--purple); }
  #reply-input::placeholder { color: var(--dim); }

  .reply-btn {
    background: var(--purple); border: none; color: white;
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; font-size: 20px;
    transition: all 0.15s;
  }
  .reply-btn:active { transform: scale(0.93); background: #9333ea; }

  .typing-btn {
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 10px;
    font-size: 13px; cursor: pointer; font-family: inherit;
    font-weight: 500; transition: all 0.15s; display: flex;
    align-items: center; gap: 6px;
  }
  .typing-btn:active { transform: scale(0.96); }

  /* Notification toast */
  .toast {
    position: fixed; top: 16px; right: 16px; left: 16px;
    background: var(--card); border: 1px solid var(--purple);
    border-radius: 14px; padding: 14px 16px; z-index: 999;
    transform: translateY(-80px); transition: transform 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); }
  .toast-title { font-size: 13px; font-weight: 700; color: var(--purple); margin-bottom: 4px; }
  .toast-body { font-size: 14px; line-height: 1.4; }

  /* ── Notification sound toggle ── */
  .sound-toggle {
    background: none; border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 8px;
    font-size: 13px; cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="header-title">
      <div class="status-dot"></div>
      🎭 Prank Admin
    </div>
    <div class="header-sub">You are "ChatGPT" 😈</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="sound-toggle" onclick="toggleSound()" id="sound-btn">🔔</button>
    <div class="session-count" id="session-count">0 live</div>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('list')" id="tab-list">
    💬 Chats
    <span class="tab-badge" id="unread-badge" style="display:none">0</span>
  </div>
</div>

<!-- Content -->
<div class="content">
  <!-- List view -->
  <div id="view-list">
    <div class="empty-list" id="empty-msg">
      <div class="emoji">👀</div>
      <p>Waiting for your friends to visit the chat page...</p>
      <p style="font-size:13px;margin-top:4px;">Share <strong>chat.html</strong> link with them!</p>
    </div>
  </div>

  <!-- Chat view -->
  <div id="view-chat">
    <div class="chat-header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <div class="chat-header-info">
        <div class="chat-header-id" id="active-session-label">Session</div>
        <div class="chat-header-status">● Online</div>
      </div>
      <button class="typing-btn" onclick="sendTyping()">✍️ Typing...</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <div class="quick-replies">
        <button class="qr-chip" onclick="quickReply(this)">Sure! Let me help 😊</button>
        <button class="qr-chip" onclick="quickReply(this)">That's a great question!</button>
        <button class="qr-chip" onclick="quickReply(this)">I'm thinking... 🤔</button>
        <button class="qr-chip" onclick="quickReply(this)">As an AI, I cannot do that 😅</button>
        <button class="qr-chip" onclick="quickReply(this)">Can you give more details?</button>
        <button class="qr-chip" onclick="quickReply(this)">Interesting! Tell me more</button>
        <button class="qr-chip" onclick="quickReply(this)">I've analyzed this carefully...</button>
        <button class="qr-chip" onclick="quickReply(this)">Based on my training data...</button>
      </div>
      <div class="reply-row">
        <textarea
          id="reply-input"
          rows="1"
          placeholder="Type your reply as ChatGPT..."
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"
        ></textarea>
        <button class="reply-btn" onclick="sendReply()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <div class="toast-title" id="toast-title">New message!</div>
  <div class="toast-body" id="toast-body"></div>
</div>

<!-- Ably SDK -->
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script>
// ════════════════════════════════════════════
// CONFIG — same Ably key as chat.html
// ════════════════════════════════════════════
const ABLY_KEY = 'vlg2Ow.muY0Zg:ONSBhsE9bjfY_HYczM0YVAYi-j9MX4vpta3CSE__xOw';
// ════════════════════════════════════════════

const ably = new Ably.Realtime({ key: ABLY_KEY });

// sessions = { sessionId: { channel, messages: [], unread } }
const sessions = {};
let activeSession = null;
let soundEnabled = true;

// ── Audio: beep on new message ──
function beep() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-btn').textContent = soundEnabled ? '🔔' : '🔕';
}

// ── Subscribe to wildcard to catch all sessions ──
// We use Ably's channel namespace + presence to discover sessions
// Instead, friends publish to 'chat_SESSION_ID' and we monitor all

// We'll use a "registry" channel where friends announce themselves
const registry = ably.channels.get('admin_registry');

registry.subscribe('announce', (msg) => {
  const { sessionId } = msg.data;
  joinSession(sessionId);
});

function joinSession(sessionId) {
  if (sessions[sessionId]) return;

  const ch = ably.channels.get('chat_' + sessionId);
  sessions[sessionId] = { channel: ch, messages: [], unread: 0 };

  ch.subscribe('user_message', (msg) => {
    const { text, timestamp } = msg.data;
    const sess = sessions[sessionId];
    sess.messages.push({ role: 'user', text, time: timestamp || Date.now() });

    if (activeSession !== sessionId) {
      sess.unread++;
      showToast('💬 Friend says:', text, sessionId);
      beep();
    } else {
      appendBubble('user', text);
    }

    updateList();
    updateUnreadBadge();
  });

  updateList();
  updateSessionCount();
}

// ── Toast ──
let toastTimer;
function showToast(title, body, fromSession) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent = body.substring(0, 80) + (body.length > 80 ? '...' : '');
  toast.classList.add('show');
  toast.onclick = () => { openChat(fromSession); toast.classList.remove('show'); };
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 5000);
}

// ── Update sessions list ──
function updateList() {
  const container = document.getElementById('view-list');
  const empty = document.getElementById('empty-msg');

  const ids = Object.keys(sessions);
  if (ids.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  // Re-render all cards
  // Remove old cards
  container.querySelectorAll('.conv-card').forEach(e => e.remove());

  ids.forEach(sid => {
    const sess = sessions[sid];
    const lastMsg = sess.messages[sess.messages.length - 1];
    const card = document.createElement('div');
    card.className = 'conv-card' + (sess.unread > 0 ? ' unread' : '');
    card.onclick = () => openChat(sid);

    const shortId = sid.replace('session_', '').toUpperCase();
    const preview = lastMsg
      ? `<strong>${lastMsg.role === 'user' ? 'Friend' : 'You'}:</strong> ${lastMsg.text.substring(0, 60)}${lastMsg.text.length > 60 ? '...' : ''}`
      : 'No messages yet...';
    const timeStr = lastMsg ? formatTime(lastMsg.time) : 'Just joined';

    card.innerHTML = `
      <div class="conv-header">
        <span class="conv-id">🙈 Friend #${shortId}</span>
        <span class="conv-time">${timeStr}</span>
      </div>
      <div class="conv-preview">${preview}</div>
      <div class="conv-footer">
        <span class="msg-count">${sess.messages.length} messages</span>
        ${sess.unread > 0 ? `<span class="unread-badge">${sess.unread} new</span>` : ''}
      </div>`;

    container.insertBefore(card, container.firstChild);
  });
}

function updateUnreadBadge() {
  const total = Object.values(sessions).reduce((s, v) => s + v.unread, 0);
  const badge = document.getElementById('unread-badge');
  if (total > 0) {
    badge.style.display = 'flex';
    badge.textContent = total;
  } else {
    badge.style.display = 'none';
  }
}

function updateSessionCount() {
  document.getElementById('session-count').textContent = Object.keys(sessions).length + ' live';
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── Open a chat ──
function openChat(sessionId) {
  activeSession = sessionId;
  const sess = sessions[sessionId];
  sess.unread = 0;
  updateList();
  updateUnreadBadge();

  document.getElementById('view-list').style.display = 'none';
  const chatView = document.getElementById('view-chat');
  chatView.style.display = 'flex';

  const shortId = sessionId.replace('session_', '').toUpperCase();
  document.getElementById('active-session-label').textContent = '🙈 Friend #' + shortId;

  // Render messages
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  sess.messages.forEach(m => appendBubble(m.role, m.text, m.time, false));
  container.scrollTop = container.scrollHeight;
}

function goBack() {
  activeSession = null;
  document.getElementById('view-chat').style.display = 'none';
  document.getElementById('view-list').style.display = 'flex';
}

// ── Append bubble ──
function appendBubble(role, text, time = Date.now(), scroll = true) {
  const container = document.getElementById('chat-messages');
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble ' + (role === 'user' ? 'user' : 'admin');
  bubble.innerHTML = `${text}<div class="bubble-time">${role === 'user' ? '🧑 Friend' : '🤖 You (as GPT)'} · ${formatTime(time)}</div>`;
  container.appendChild(bubble);
  if (scroll) container.scrollTop = container.scrollHeight;
}

// ── Send reply ──
async function sendReply() {
  if (!activeSession) return;
  const input = document.getElementById('reply-input');
  const text = input.value.trim();
  if (!text) return;

  const sess = sessions[activeSession];
  await sess.channel.publish('admin_reply', { text, timestamp: Date.now() });

  sess.messages.push({ role: 'admin', text, time: Date.now() });
  appendBubble('admin', text);
  input.value = '';
  input.style.height = 'auto';
}

async function sendTyping() {
  if (!activeSession) return;
  await sessions[activeSession].channel.publish('admin_typing', {});
  // Flash button
  const btn = document.querySelector('.typing-btn');
  btn.style.background = '#7c3aed';
  btn.style.borderColor = '#7c3aed';
  setTimeout(() => { btn.style.background = ''; btn.style.borderColor = ''; }, 600);
}

function quickReply(chip) {
  document.getElementById('reply-input').value = chip.textContent;
  autoResize(document.getElementById('reply-input'));
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendReply();
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}
</script>
</body>
</html>
